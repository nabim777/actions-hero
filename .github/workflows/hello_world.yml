name: Hello world workflow

on: [ pull_request ]
  # #it is an events gives us the button in UI to run the code without push in the repository
  # workflow_dispatch:

jobs:
  _hello_:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: hello world
        run: echo "Hello world"
  
  _goodbye_:
    runs-on: ubuntu-latest
    steps:
      - name: goodbye world
        run: echo "Good Bye"

  merge:
    runs-on: ubuntu-latest
    needs: [_hello_, _goodbye_]
    steps:
      # - name: print needs
      #   run: echo '${{ toJson(needs) }}' | jq 'keys'
      
      - name: print hello world job result
        run: |
          echo "Hello world job result: ${{ needs._hello_.result }}"

      - name: print goodbye world job result
        run: |
          echo "Goodbye world job result: ${{ needs._goodbye_.result }}"

      


      # - name: Dump needs context
      #   env:
      #     NEEDS_CONTEXT: ${{ toJson(needs) }}
      #   run: echo "$NEEDS_CONTEXT"