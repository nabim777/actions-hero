name: Hello world workflow

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      nextcloud_versions:
        required: false
        type: string
        default: "33 master"

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: hello world
        run: echo "Hello world"
        shell: bash
  
  goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: goodbye world
        run: echo "Good Bye"
        shell: bash
